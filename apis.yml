aid: national-institute-of-mental-health
name: National Institute of Mental Health
description: >-
  The National Institute of Mental Health (NIMH) is the lead federal agency
  for research on mental disorders. NIMH conducts and supports research that
  seeks to understand, treat, and prevent mental illness, working to
  transform the understanding and treatment of mental illness.
